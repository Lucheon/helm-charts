apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pterodactyl-panel.fullname" . }}
  labels:
    {{- include "pterodactyl-panel.labels" . | nindent 4 }}
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pterodactyl-panel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pterodactyl-panel.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: redis
          securityContext:
            {{- toYaml .Values.redis.securityContext | nindent 12 }}
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          args: {{ .Values.redis.args }}
          restartPolicy: Always
          env:
          {{- with .Values.redis.env }}
            {{- range $key, $val := . }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- end }}
          envFrom:
          - secretRef:
              name: {{ include "pterodactyl-panel.fullname" . }}-redis-env
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
        - name: mariadb
          securityContext:
            {{- toYaml .Values.mariadb.securityContext | nindent 12 }}
          image: "{{ .Values.mariadb.image.repository }}:{{ .Values.mariadb.image.tag }}"
          imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
          args: {{ .Values.mariadb.args }}
          restartPolicy: Always
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: database
          env:
            - name: MYSQL_DATABASE
              value: panel
            - name: MYSQL_USER
              value: pterodactyl
          {{- with .Values.mariadb.env }}
            {{- range $key, $val := . }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- end }}
          envFrom:
          - secretRef:
              name: {{ include "pterodactyl-panel.fullname" . }}-mariadb-env
          resources:
            {{- toYaml .Values.mariadb.resources | nindent 12 }}
      containers:
        - name: pterodactyl-panel
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CACHE_DRIVER
              value: redis
            - name: SESSION_DRIVER
              value: redis
            - name: REDIS_HOST
              value: 127.0.0.1
            - name: DB_HOST
              value: 127.0.0.1
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: panel
            - name: DB_USERNAME
              value: pterodactyl
            - name: LE_EMAIL
              value: ""
          {{- with .Values.env }}
            {{- range $key, $val := . }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- end }}
          args: {{ .Values.args }}
          envFrom:
          - secretRef:
              name: {{ include "pterodactyl-panel.fullname" . }}-env
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
          readinessProbe:
            tcpSocket:
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /app/var/
              name: data
              subPath: var
            - mountPath: /etc/nginx/http.d/
              name: data
              subPath: nginx
            - mountPath: /app/storage/logs
              name: data
              subPath: logs
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.data.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.data.existingClaim | default ( printf "%s-%s" (include "pterodactyl-panel.fullname" .) "data" ) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: database
          {{- if .Values.persistence.database.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.database.existingClaim | default ( printf "%s-%s" (include "pterodactyl-panel.fullname" .) "database" ) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
